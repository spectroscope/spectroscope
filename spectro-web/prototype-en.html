<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2312120F'/%3E%3Cpath d='M16 6 L26 16 L16 26 L6 16 Z' fill='%23FF5959'/%3E%3C/svg%3E"
    />
    <title>spectroscope · System-Map (React Flow prototype)</title>
    <script>
      // FOUC guard: apply the saved skin before the bundle paints (same as index.html).
      (function () {
        try {
          var raw = localStorage.getItem("spectroscope:design");
          var p = raw ? JSON.parse(raw) : {};
          var ids = ["classic", "nebula", "nocturne", "obsidian", "staffwise", "neon-riot"];
          document.documentElement.setAttribute("data-design", ids.indexOf(p.design) >= 0 ? p.design : "classic");
        } catch (e) {
          /* storage blocked — classic stands */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/prototype-en/main.tsx"></script>
  </body>
</html>
