# Localhost only — auth, TLS and origin checks are deliberately out of scope; the bind stays 127.0.0.1.
server.address=127.0.0.1
server.port=8080
spring.application.name=spectro-server
# The built React UI is served from classpath:/static (Vite writes it there).
# The settings API (SettingsController) throws ResponseStatusException with a
# readable validation reason (e.g. "unknown settings key ..."); Spring Boot's
# default (never) strips that reason from the error JSON's "message" field, so
# the web client's inline error display only ever saw "HTTP 400". Every
# ResponseStatusException reason in this codebase is a deliberate user-facing
# message — none carries a secret or path — so surfacing it is safe here.
server.error.include-message=always
